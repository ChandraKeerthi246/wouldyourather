<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

            font-size: 48px;
            margin-bottom: 25px;
        }

        .box {
            background: #334155;
            border-radius: 18px;
            padding: 20px;
            margin: 20px 0;
        }

        .label {
            color: #94a3b8;
            font-size: 18px;
        }

        .value {
            font-size: 28px;
            color: #22d3ee;
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
            font-size: 19px;
        }

        li {
            margin: 10px 0;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            background: #22d3ee;
            color: #0f172a;
            padding: 15px 30px;
