<!DOCTYPE html>
<html>
<head>
    <title>Would You Rather?</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 650px;
            background: #1e293b;
            border: 2px solid #22d3ee;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 25px #22d3ee;
        }

        input {
            padding: 15px;
            width: 80%;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            margin-top: 20px;
        }

        button {
            margin-top: 25px;
            background: #22d3ee;
            color: #0f172a;
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Would You Rather?</h1>
    <p>Enter your nickname to begin.</p>

    <form action="/start" method="post">
        <input type="text" name="nickname" placeholder="ChaosQueen42" required>
        <br>
        <button type="submit">Start Adventure</button>
    </form>
</div>
</body>
</html>
