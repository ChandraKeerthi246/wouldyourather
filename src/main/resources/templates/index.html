<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Would You Rather?</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 800px;
            background: #1e293b;
            border: 2px solid #22d3ee;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 25px #22d3ee;
        }

        h1 {
            font-size: 50px;
        }

        .progress {
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .question {
            font-size: 22px;
            margin-bottom: 40px;
        }

        .options {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .choice {
            background: #334155;
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            width: 220px;
            height: 260px;
            cursor: pointer;
            transition: 0.3s;
        }

        .choice:hover {
            transform: scale(1.05);
            border-color: #22d3ee;
            box-shadow: 0 0 20px #22d3ee;
        }

        .icon {
            font-size: 70px;
            margin-top: 30px;
        }

        .choice h3 {
            margin-top: 25px;
            font-size: 24px;
            padding: 0 15px;
        }
    </style>

    <div class="progress">
        Question <span th:text="${questionNumber}"></span> /

    </div>
